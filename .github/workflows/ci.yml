name: CI

on:
  pull_request:
    branches: [main]

env:
  SOLANA_CLI_VERSION: stable
  RUST_TOOLCHAIN: stable

jobs:
  build:
    name: Build Programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-build-${{ runner.os }}-

      - name: Cache Solana CLI
        uses: actions/cache@v4
        id: cache-solana
        with:
          path: ~/.local/share/solana
          key: solana-${{ env.SOLANA_CLI_VERSION }}-${{ runner.os }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_CLI_VERSION }}/install)"

      - name: Add Solana CLI to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Build all programs
        run: cargo build-sbf

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-test-${{ runner.os }}-

      - name: Cache Solana CLI
        uses: actions/cache@v4
        id: cache-solana
        with:
          path: ~/.local/share/solana
          key: solana-${{ env.SOLANA_CLI_VERSION }}-${{ runner.os }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_CLI_VERSION }}/install)"

      - name: Add Solana CLI to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Build all programs
        run: cargo build-sbf

      - name: Fetch Token-2022 program binary for Mollusk tests
        run: |
          solana program dump -u mainnet-beta \
            TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb \
            target/deploy/spl_token_2022.so

      - name: Test permission-manager
        run: cargo test-sbf -p permission-manager

      - name: Test spiko-token
        run: cargo test-sbf -p spiko-token

      - name: Test spiko-transfer-hook
        run: cargo test-sbf -p spiko-transfer-hook

      - name: Test minter
        run: cargo test-sbf -p minter

      - name: Test redemption
        run: cargo test-sbf -p redemption

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-integration-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-integration-${{ runner.os }}-

      - name: Cache Solana CLI
        uses: actions/cache@v4
        id: cache-solana
        with:
          path: ~/.local/share/solana
          key: solana-${{ env.SOLANA_CLI_VERSION }}-${{ runner.os }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_CLI_VERSION }}/install)"

      - name: Add Solana CLI to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Run integration tests
        run: cargo test-sbf -p integration-tests
